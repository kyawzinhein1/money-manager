<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007aff" />
      <stop offset="100%" stop-color="#5856d6" />
    </linearGradient>
    
    <!-- Dollar Sign Specular Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Metallic/Gold Accent for Dollar symbol -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a2a2a6" />
    </linearGradient>

    <!-- Glass Overlay Reflection -->
    <linearGradient id="reflectionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="40.1%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Outer Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.35" />
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- iOS Styled Rounded Rect Base with Shadow -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- Inner Liquid Glass Glow -->
  <rect x="40" y="40" width="432" height="432" rx="92" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.25" />

  <!-- Stylized Glass Credit Card in background (rotated slightly) -->
  <g transform="translate(256, 256) rotate(-10) translate(-256, -256)">
    <rect x="112" y="144" width="288" height="180" rx="24" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.2" />
    <circle cx="160" cy="192" r="16" fill="#ffffff" fill-opacity="0.15" />
    <rect x="200" y="184" width="80" height="16" rx="4" fill="#ffffff" fill-opacity="0.1" />
  </g>

  <!-- Specular Highlights / Liquid Reflection Wave -->
  <path d="M 32,32 C 150,220 362,100 480,480 L 480,32 Z" fill="url(#reflectionGrad)" />

  <!-- Main Dollar Sign in 3D Style -->
  <g filter="url(#glow)">
    <!-- Dollar Sign Background Glow shadow -->
    <text x="256" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica" font-size="240" font-weight="900" text-anchor="middle" fill="#000000" opacity="0.25" transform="translate(0, 8)">$</text>
    <!-- Dollar Sign main body -->
    <text x="256" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica" font-size="240" font-weight="900" text-anchor="middle" fill="url(#goldGrad)">$</text>
  </g>
</svg>
